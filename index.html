<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes de Armonización Legislativa</title>

<link rel="icon" href="favicon.png" type="image/png">

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 40px;
    background-color: #f4f6f8;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 {
    color: #2c3e50;
}

#ultima-actualizacion {
    color: #7f8c8d;
    margin-bottom: 15px;
}

.stats {
    margin-bottom: 15px;
    font-weight: bold;
}

.filtros {
    margin-bottom: 15px;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    background-color: #2980b9;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #1f5f8a;
}
</style>
</head>

<body>

<div class="container">

<h2>Pendientes de Armonización Legislativa</h2>
<div id="ultima-actualizacion">Cargando...</div>

<div class="stats" id="stats"></div>

<div class="filtros">
    <button id="filtroVencidos">Mostrar solo vencidos</button>
    <button id="limpiarFiltro">Mostrar todos</button>
</div>

<table id="tabla" class="display" style="width:100%">
<thead>
<tr>
<th>No</th>
<th>ORDENAMIENTO</th>
<th>MATERIA REFORMA</th>
<th>PUBLICACIÓN DOF</th>
<th>PLAZO</th>
<th>FECHA LÍMITE</th>
<th>VENCIMIENTO</th>
<th>HECHO</th>
<th>ENLACE</th>
</tr>
</thead>
</table>

</div>

<script>

function calcularVencimiento(fechaLimiteStr) {
    if (!fechaLimiteStr) return "";

    const partes = fechaLimiteStr.split("/");
    const fechaLimiteUTC = Date.UTC(partes[2], partes[1]-1, partes[0]);

    const hoy = new Date();
    const hoyUTC = Date.UTC(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());

    const diff = Math.round((fechaLimiteUTC - hoyUTC) / (1000 * 60 * 60 * 24));

    if (diff < 0) return "VENCIDO";
    if (diff === 0) return "VENCE HOY";
    return "FALTAN " + diff + " DÍAS";
}

let tabla;

$(document).ready(function() {

    $.ajax({
        url: "datos.csv?v=" + new Date().getTime(),
        dataType: "text",
        success: function(data, status, xhr) {

            // Última actualización
            const header = xhr.getResponseHeader("Last-Modified");
            if (header) {
                const fecha = new Date(header);
                $("#ultima-actualizacion").text(
                    "Última actualización: " +
                    fecha.toLocaleDateString('es-MX')
                );
            }

            // Parse CSV
            const parsed = Papa.parse(data, {
                header: true,
                skipEmptyLines: true
            });

            const datos = parsed.data;

            // Contadores
            let vencidos = 0, enTiempo = 0;

            datos.forEach(d => {
                const v = calcularVencimiento(d["FECHA LÍMITE"]);
                if (v === "VENCIDO") vencidos++;
                else enTiempo++;
            });

            $("#stats").html(
                `🔴 Vencidos: ${vencidos} | 🟢 En plazo: ${enTiempo}`
            );

            // Tabla
            tabla = $('#tabla').DataTable({
                data: datos,
                columns: [
                    { data: "No" },
                    { data: "ORDENAMIENTO" },
                    { data: "MATERIA REFORMA" },
                    { data: "PUBLICACIÓN DOF" },
                    { data: "PLAZO PARA ARMONIZAR" },
                    { data: "FECHA LÍMITE" },
                    {
                        data: "FECHA LÍMITE",
                        render: function(data) {
                            const v = calcularVencimiento(data);

                            if (v === "VENCIDO")
                                return `<span style="color:red;font-weight:bold;">${v}</span>`;

                            if (v === "VENCE HOY")
                                return `<span style="color:orange;font-weight:bold;">${v}</span>`;

                            return v;
                        }
                    },
                    {
                        data: "HECHO",
                        render: function(data) {
                            if (data.toLowerCase() === "sí" || data.toLowerCase() === "si")
                                return '<span style="color:green;">✔</span>';
                            return '<span style="color:#999;">✖</span>';
                        }
                    },
                    {
                        data: "ENLACE",
                        render: function(data) {
                            return `<a href="${data}" target="_blank">Ver</a>`;
                        }
                    }
                ],
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
                },
                pageLength: 25
            });

        }
    });

    // Filtro vencidos
    $('#filtroVencidos').click(function() {
        $.fn.dataTable.ext.search.push(function(settings, data) {
            return data[6].includes("VENCIDO");
        });
        tabla.draw();
    });

    // Limpiar filtro
    $('#limpiarFiltro').click(function() {
        $.fn.dataTable.ext.search.pop();
        tabla.draw();
    });

});

</script>

</body>
</html>
