<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Armonización Legislativa</title>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f4f6f8; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1300px; margin: auto; }
        h2 { color: #2c3e50; margin-top: 0; }
        #ultima-actualizacion { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }

        /* Dashboard de 4 columnas */
        .stats-container { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 180px; padding: 15px; border-radius: 8px; text-align: center; background: #fff; border: 1px solid #e1e4e8; }
        .stat-number { display: block; font-size: 1.6em; font-weight: bold; margin-bottom: 5px; }

        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-red { background-color: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .badge-orange { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ffcc80; }
        .badge-blue { background-color: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .badge-green { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .badge-gray { background-color: #f5f5f5; color: #616161; border: 1px solid #bdbdbd; }

        .controls { margin-bottom: 20px; }
        button { padding: 8px 16px; border-radius: 6px; border: none; background: #34495e; color: white; cursor: pointer; font-weight: 500; }
        #filtroVencidos { background: #e74c3c; }
        a { color: #2980b9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pendientes de Armonización Legislativa</h2>
    <div id="ultima-actualizacion">Cargando...</div>
    
    <div id="stats"></div>

    <div class="controls">
        <button id="filtroVencidos">Ver Incumplimientos Vencidos</button>
        <button id="limpiarFiltro">Mostrar Todo</button>
    </div>

    <table id="tabla" class="display" style="width:100%">
        <thead>
            <tr>
                <th>No</th>
                <th>Ordenamiento</th>
                <th>Materia</th>
                <th>Publicación</th>
                <th>Plazo</th>
                <th>Fecha Límite</th>
                <th>Estado</th>
                <th>Hecho</th>
                <th>Decreto</th>
                <th>Iniciativa</th>
            </tr>
        </thead>
    </table>
</div>

<script>
function calcularVencimiento(fechaLimiteStr) {
    if (!fechaLimiteStr || fechaLimiteStr.toLowerCase().includes("pendiente") || fechaLimiteStr === "-") return "PENDIENTE";
    const partes = fechaLimiteStr.split("/");
    const fechaUTC = Date.UTC(partes[2], partes[1]-1, partes[0]);
    const hoy = new Date();
    const hoyUTC = Date.UTC(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
    const diff = Math.round((fechaUTC - hoyUTC) / (1000 * 60 * 60 * 24));
    if (diff < 0) return "VENCIDO";
    if (diff === 0) return "VENCE HOY";
    return "FALTAN " + diff + " DÍAS";
}

let tabla;

$(document).ready(function() {
    $.ajax({
        url: "datos.csv?v=" + new Date().getTime(),
        dataType: "text",
        success: function(data, status, xhr) {
            const parsed = Papa.parse(data, { header: true, skipEmptyLines: true });
            const datos = parsed.data;
// 2. RECUPERAR FECHA (Tu código original restaurado)
    const header = xhr.getResponseHeader("Last-Modified");
    if (header) {
        const fecha = new Date(header);
        $("#ultima-actualizacion").text(
            "Última actualización: " + fecha.toLocaleDateString('es-MX')
        );
    } else {
        // Opcional: Si por alguna razón falla el header en una sesión, 
        // ponemos la fecha de hoy para que no se vea el "Cargando"
        $("#ultima-actualizacion").text("Última actualización: " + new Date().toLocaleDateString('es-MX'));
    }
            // --- Lógica de Conteo Específica ---
            let vencidos = 0, enDictamen = 0, cumplidos = 0, pendientes = 0;

            datos.forEach(d => {
                const hecho = d["HECHO"].toLowerCase();
                const vStatus = calcularVencimiento(d["FECHA LÍMITE"]);

                if (hecho.includes("si") || hecho === "sí") {
                    cumplidos++;
                } else if (hecho.includes("dictamen")) {
                    enDictamen++; // Aquí contará los 4 registros con Dictamen Pendiente
                } else if (vStatus === "VENCIDO") {
                    vencidos++;
                } else {
                    pendientes++;
                }
            });

            $("#stats").html(`
                <div class="stats-container">
                    <div class="stat-card" style="border-top: 5px solid #e74c3c;"><span class="stat-number" style="color:#e74c3c;">${vencidos}</span><span>Vencidos</span></div>
                    <div class="stat-card" style="border-top: 5px solid #3498db;"><span class="stat-number" style="color:#3498db;">${enDictamen}</span><span>En Dictaminación</span></div>
                    <div class="stat-card" style="border-top: 5px solid #f39c12;"><span class="stat-number" style="color:#f39c12;">${pendientes}</span><span>Pendientes</span></div>
                    <div class="stat-card" style="border-top: 5px solid #27ae60;"><span class="stat-number" style="color:#27ae60;">${cumplidos}</span><span>Cumplidos</span></div>
                </div>
            `);

            tabla = $('#tabla').DataTable({
                data: datos,
                columns: [
                    { data: "No" },
                    { data: "ORDENAMIENTO" },
                    { data: "MATERIA REFORMA" },
                    { data: "PUBLICACIÓN DOF" },
                    { data: "PLAZO PARA ARMONIZAR" },
                    { data: "FECHA LÍMITE" },
                    {
                        data: "FECHA LÍMITE",
                        render: function(data, type, row) {
                            const hecho = row.HECHO.toLowerCase();
                            const v = calcularVencimiento(data);
                            if (hecho.includes("si")) return `<span class="badge badge-green">Cumplido</span>`;
                            if (hecho.includes("dictamen")) return `<span class="badge badge-blue">Dictaminación</span>`;
                            if (v === "VENCIDO") return `<span class="badge badge-red">${v}</span>`;
                            return `<span class="badge badge-gray">${v}</span>`;
                        }
                    },
                    {
                        data: "HECHO",
                        render: data => data.toLowerCase().includes("dictamen") 
                            ? `<span style="color:#2980b9;">● Dictamen</span>` 
                            : (data.toLowerCase().includes("si") ? '✔' : 'No')
                    },
                    { data: "ENLACE DECRETO", render: d => `<a href="${d}" target="_blank">📄</a>` },
                    { data: "INICIATIVA LOCAL", render: d => (d && d.toLowerCase() !== "no hay") ? `<a href="${d}" target="_blank">📂 Ver</a>` : '-' }
                ],
                language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" }
            });
        }
    });

    $('#filtroVencidos').click(function() {
        $.fn.dataTable.ext.search.push(function(settings, data, dataIndex, rowData) {
            const v = calcularVencimiento(rowData["FECHA LÍMITE"]);
            const hecho = rowData["HECHO"].toLowerCase();
            return v === "VENCIDO" && !hecho.includes("si") && !hecho.includes("dictamen");
        });
        tabla.draw();
    });

    $('#limpiarFiltro').click(function() {
        $.fn.dataTable.ext.search.pop();
        tabla.draw();
    });
});
</script>
</body>
</html>
