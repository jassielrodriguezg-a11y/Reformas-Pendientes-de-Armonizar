<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Armonización Legislativa</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f4f6f8; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1400px; margin: auto; }
        h2 { color: #2c3e50; margin-top: 0; }
        #ultima-actualizacion { color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; }

        .stats-container { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 250px; padding: 20px; border-radius: 10px; text-align: center; background: #fff; border: 1px solid #e1e4e8; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .stat-number { display: block; font-size: 2.2em; font-weight: bold; margin-bottom: 5px; }
        .sub-stats { display: none; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; font-size: 0.9em; text-align: left; }
        .sub-item { display: flex; justify-content: space-between; margin-bottom: 5px; color: #555; }

        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-red { background-color: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .badge-orange { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ffcc80; }
        .badge-green { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .badge-gray { background-color: #f5f5f5; color: #616161; border: 1px solid #bdbdbd; }
        .badge-blue { background-color: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

        .controls { margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        button { padding: 8px 16px; border-radius: 6px; border: none; color: white; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        .btn-gray { background: #7f8c8d; }
        .btn-pdf { background: #e74c3c; }
        .btn-pdf:hover { background: #c0392b; }
        a { color: #2980b9; text-decoration: none; font-weight: bold; }

        .ini-link { margin-right: 6px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; font-size: 0.9em; }
        .ini-link::before { content: "📂"; }

        #pdfMsg { display: none; color: #27ae60; font-size: 0.85em; font-weight: 500; margin-left: auto; }
        #errorMsg { display: none; color: #c0392b; font-weight: 500; margin-bottom: 15px; padding: 10px; background: #fadbd8; border-radius: 6px; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 999; font-size: 1.2em; color: #34495e;
        }
        .loading-overlay small { font-size: 0.9em; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div>🔄 Cargando datos desde GitHub...</div>
    <small id="loadingStatus">Conectando...</small>
</div>

<div class="container">
    <h2>Portal de Obligaciones de Armonización Legislativa</h2>
    <div id="ultima-actualizacion">Cargando fecha...</div>
    <div id="errorMsg"></div>
    <div id="stats"></div>

    <div class="controls">
        <button id="limpiarFiltro" class="btn-gray">Ver Todo el Listado</button>
        <button id="btnExportarPDF" class="btn-pdf">📄 Exportar Pendientes en PDF</button>
        <span id="pdfMsg"></span>
    </div>

    <table id="tabla" class="display" style="width:100%">
        <thead>
            <tr>
                <th>No</th><th>Ordenamiento</th><th>Materia</th><th>Publicación DOF</th><th>Plazo</th>
                <th>Fecha Límite</th><th>Estado</th><th>Hecho</th><th>Decreto</th><th>Iniciativa local</th>
            </tr>
        </thead>
    </table>
</div>

<script>
// ⚙️ URL DE TU CSV EN GITHUB (YA CONFIGURADA)
const CSV_URL = 'https://raw.githubusercontent.com/jassielrodriguezg-a11y/Reformas-Pendientes-de-Armonizar/refs/heads/main/datos.csv';

// ✅ HELPER: Normalizar texto (quita acentos, mayúsculas, espacios)
function normalizarTexto(texto) {
    return (texto || "").toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// ✅ HELPER: Extraer URLs de iniciativas (soporta múltiple con |)
function obtenerIniciativas(valor) {
    if (!valor || valor.toString().trim().toLowerCase() === "no hay" || valor.toString().trim() === "") {
        return { existe: false, urls: [] };
    }
    const urls = valor.toString().split('|').map(u => u.trim()).filter(u => /^https?:\/\//i.test(u));
    return { existe: urls.length > 0, urls };
}

// 📅 Cálculo de vencimiento
function calcularVencimiento(fechaLimiteStr) {
    if (!fechaLimiteStr || fechaLimiteStr.toString().toLowerCase().includes("pendiente") || fechaLimiteStr === "-") return "PENDIENTE";
    const partes = fechaLimiteStr.toString().split("/");
    if (partes.length < 3) return "PENDIENTE";
    const fechaUTC = Date.UTC(parseInt(partes[2]), parseInt(partes[1])-1, parseInt(partes[0]));
    if (isNaN(fechaUTC)) return "PENDIENTE";
    const hoy = new Date();
    const hoyUTC = Date.UTC(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
    const diff = Math.round((fechaUTC - hoyUTC) / (1000 * 60 * 60 * 24));
    if (diff < 0) return "VENCIDO";
    if (diff === 0) return "VENCE HOY";
    return "FALTAN " + diff + " DÍAS";
}

// 📊 Estadísticas
function calcularEstadisticas(datos) {
    let c = { vencidosTotal: 0, vConIni: 0, vSinIni: 0, vigentesTotal: 0, gConIni: 0, gSinIni: 0, cumplidos: 0 };
    datos.forEach(d => {
        const h = normalizarTexto(d["HECHO"]);
        const v = calcularVencimiento(d["FECHA LÍMITE"]);
        const ini = obtenerIniciativas(d["INICIATIVA LOCAL"]).existe;
        if (h.includes("si")) c.cumplidos++;
        else if (v === "VENCIDO") { c.vencidosTotal++; ini ? c.vConIni++ : c.vSinIni++; }
        else { c.vigentesTotal++; ini ? c.gConIni++ : c.gSinIni++; }
    });
    return c;
}

// 🎨 Dashboard
function renderizarDashboard(stats) {
    $("#stats").html(`
        <div class="stats-container">
            <div class="stat-card" onclick="$(this).find('.sub-stats').slideToggle()" style="border-top: 5px solid #e74c3c;">
                <span style="color:#e74c3c; font-weight:bold;">VENCIDOS</span>
                <span class="stat-number" style="color:#e74c3c;">${stats.vencidosTotal}</span>
                <small>Haga clic para detalles</small>
                <div class="sub-stats">
                    <div class="sub-item" onclick="filtrar('vencido-con'); event.stopPropagation();"><span>Con iniciativa:</span> <b>${stats.vConIni}</b></div>
                    <div class="sub-item" onclick="filtrar('vencido-sin'); event.stopPropagation();"><span>Sin iniciativa:</span> <b>${stats.vSinIni}</b></div>
                </div>
            </div>
            <div class="stat-card" onclick="$(this).find('.sub-stats').slideToggle()" style="border-top: 5px solid #3498db;">
                <span style="color:#3498db; font-weight:bold;">VIGENTES</span>
                <span class="stat-number" style="color:#3498db;">${stats.vigentesTotal}</span>
                <small>Haga clic para detalles</small>
                <div class="sub-stats">
                    <div class="sub-item" onclick="filtrar('vigente-con'); event.stopPropagation();"><span>Con iniciativa:</span> <b>${stats.gConIni}</b></div>
                    <div class="sub-item" onclick="filtrar('vigente-sin'); event.stopPropagation();"><span>Sin iniciativa:</span> <b>${stats.gSinIni}</b></div>
                </div>
            </div>
            <div class="stat-card" style="border-top: 5px solid #27ae60; cursor:default;">
                <span style="color:#27ae60; font-weight:bold;">CUMPLIDOS</span>
                <span class="stat-number" style="color:#27ae60;">${stats.cumplidos}</span>
                <small>Objetivo cumplido</small>
            </div>
        </div>
    `);
}

// 🗂️ Inicializar Tabla
function inicializarTabla(datos) {
    renderizarDashboard(calcularEstadisticas(datos));
    return $('#tabla').DataTable({
        data: datos,
        columns: [
            { data: "No" }, { data: "ORDENAMIENTO" }, { data: "MATERIA REFORMA" },
            { data: "PUBLICACIÓN DOF" }, { data: "PLAZO PARA ARMONIZAR" }, { data: "FECHA LÍMITE" },
            {
                data: "FECHA LÍMITE",
                render: (d, t, r) => {
                    const h = normalizarTexto(r.HECHO);
                    const v = calcularVencimiento(d);
                    if (h.includes("si")) return `<span class="badge badge-green">Cumplido</span>`;
                    if (v === "VENCIDO") return `<span class="badge badge-red">${v}</span>`;
                    return `<span class="badge badge-gray">${v}</span>`;
                }
            },
            { 
                data: "HECHO", 
                render: (d, t, r) => {
                    const h = normalizarTexto(d || "");
                    if (h.includes("si")) return '✔';
                    if (obtenerIniciativas(r["INICIATIVA LOCAL"]).existe) return '📋 En Estudio';
                    return 'No';
                }
            },
            { 
                data: "ENLACE DECRETO", 
                render: d => (d && d.toString().toLowerCase() !== "no hay") ? `<a href="${d}" target="_blank">📄</a>` : '-'
            },
            { 
                // ✅ MÚLTIPLES INICIATIVAS
                data: "INICIATIVA LOCAL", 
                render: d => {
                    const { urls } = obtenerIniciativas(d);
                    if (urls.length === 0) return '-';
                    if (urls.length === 1) return `<a href="${urls[0]}" target="_blank" class="ini-link">Ver</a>`;
                    return urls.map((url, i) => `<a href="${url}" target="_blank" class="ini-link">Ver ${i+1}</a>`).join('');
                }
            }
        ],
        language: { url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" },
        pageLength: 25, order: [[0, 'asc']],
        initComplete: () => $("#loading").fadeOut(500)
    });
}

// 🔍 Filtrado
function filtrar(tipo) {
    while($.fn.dataTable.ext.search.length) $.fn.dataTable.ext.search.pop();
    $.fn.dataTable.ext.search.push((_, __, ___, rowData) => {
        const v = calcularVencimiento(rowData["FECHA LÍMITE"]);
        const h = normalizarTexto(rowData["HECHO"]);
        const ini = obtenerIniciativas(rowData["INICIATIVA LOCAL"]).existe;
        if (h.includes("si")) return false;
        if (tipo === 'vencido-con') return v === "VENCIDO" && ini;
        if (tipo === 'vencido-sin') return v === "VENCIDO" && !ini;
        if (tipo === 'vigente-con') return v !== "VENCIDO" && ini;
        if (tipo === 'vigente-sin') return v !== "VENCIDO" && !ini;
        return true;
    });
    if (tabla) tabla.draw();
}

// 📄 Exportar PDF
function exportarPDF(tabla) {
    if (!tabla || tabla.rows().count() === 0) return alert('No hay datos cargados.');
    const filas = tabla.rows({ search: 'applied', filter: 'applied' }).data();
    if (!filas.length) return alert('No hay registros pendientes visibles.');

    const bodyRows = [];
    filas.each(fila => {
        const v = calcularVencimiento(fila["FECHA LÍMITE"]);
        const h = normalizarTexto(fila["HECHO"]);
        const ini = obtenerIniciativas(fila["INICIATIVA LOCAL"]);
        
        let hechoTexto;
        if (h.includes("si")) hechoTexto = 'Sí';
        else if (ini.existe) hechoTexto = ini.urls.length > 1 ? `En Estudio (${ini.urls.length})` : 'En Estudio';
        else hechoTexto = 'No';

        const decretoTexto = (fila["ENLACE DECRETO"] && fila["ENLACE DECRETO"].toString().toLowerCase() !== "no hay") ? 'Disponible' : '-';
        const iniTexto = ini.existe ? (ini.urls.length > 1 ? `${ini.urls.length} iniciativas` : "Sí") : "No";

        let estado = h.includes("si") ? 'Cumplido' : v === "VENCIDO" ? 'VENCIDO' : v === "VENCE HOY" ? 'VENCE HOY' : v === "PENDIENTE" ? 'Sin Fecha' : v;

        bodyRows.push([fila["No"], fila["ORDENAMIENTO"], fila["MATERIA REFORMA"], fila["PUBLICACIÓN DOF"], fila["PLAZO PARA ARMONIZAR"], fila["FECHA LÍMITE"], estado, hechoTexto, decretoTexto, iniTexto]);
    });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape', 'mm', 'letter');
    doc.setFontSize(16).setTextColor(44,62,80).text('Portal de Obligaciones de Armonización Legislativa', 14, 15);
    doc.setFontSize(10).setTextColor(100).text('Reporte de Pendientes', 14, 22);
    doc.setFontSize(8);
    const hoy = new Date().toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric' });
    doc.text(`Generado: ${hoy} | Registros: ${bodyRows.length}`, 14, 27);

    doc.autoTable({
        startY: 32,
        head: [['No','Ordenamiento','Materia','Publicación DOF','Plazo','Fecha Límite','Estado','Hecho','Decreto','Iniciativa local']],
        body: bodyRows, theme: 'grid',
        styles: { fontSize:7, cellPadding:2, lineColor:[200,200,200], lineWidth:0.2, valign:'middle' },
        headStyles: { fillColor:[52,73,94], textColor:255, fontStyle:'bold', fontSize:7.5, halign:'center' },
        columnStyles: { 0:{cellWidth:10,halign:'center'}, 5:{cellWidth:25,halign:'center'}, 6:{halign:'center',fontStyle:'bold',cellWidth:25}, 7:{cellWidth:20,halign:'center'}, 8:{cellWidth:20,halign:'center'}, 9:{cellWidth:25,halign:'center'} },
        didParseCell: data => {
            if (data.row.index !== undefined && data.column.index === 6) {
                const e = data.cell.raw;
                if (e==='VENCIDO') { data.cell.styles.textColor=[198,40,40]; data.cell.styles.fillColor=[255,235,238]; }
                else if (e==='Cumplido') { data.cell.styles.textColor=[46,125,50]; data.cell.styles.fillColor=[232,245,233]; }
                else if (e==='VENCE HOY') { data.cell.styles.textColor=[239,108,0]; data.cell.styles.fillColor=[255,243,224]; }
            }
            if (data.row.index !== undefined && [0,6,7,8,9].includes(data.column.index)) data.cell.styles.halign = 'center';
        },
        margin: { left:14, right:14, top:14, bottom:14 }
    });

    const tp = doc.internal.getNumberOfPages();
    for (let p=1; p<=tp; p++) { doc.setPage(p); doc.setFontSize(8).setTextColor(150); doc.text(`Página ${p} de ${tp}`, doc.internal.pageSize.getWidth()-35, doc.internal.pageSize.getHeight()-8); }
    doc.save(`Pendientes_Armonizacion_${new Date().toISOString().slice(0,10)}.pdf`);
    
    const msg = $('#pdfMsg').text('✅ PDF exportado correctamente').show();
    setTimeout(() => msg.fadeOut(2000), 3000);
}

// 🚀 Inicialización
let tabla;
$(document).ready(() => {
    $("#ultima-actualizacion").text("Última actualización: " + new Date().toLocaleDateString('es-MX', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }));
    
    Papa.parse(CSV_URL, {
        download: true, header: true, skipEmptyLines: true, dynamicTyping: false,
        beforeDownload: () => $("#loadingStatus").text("Descargando archivo..."),
        complete: res => {
            const data = res.data.filter(r => r && Object.keys(r).length > 1);
            if (!data.length) { $("#errorMsg").text("⚠️ CSV vacío o formato incorrecto.").show(); $("#loading").fadeOut(300); return; }
            tabla = inicializarTabla(data);
            $('#limpiarFiltro').click(() => { while($.fn.dataTable.ext.search.length) $.fn.dataTable.ext.search.pop(); tabla.draw(); });
            $('#btnExportarPDF').click(() => exportarPDF(tabla));
        },
        error: err => {
            console.error("Error cargando CSV:", err);
            $("#errorMsg").html(`❌ <strong>Error:</strong> ${err.message || 'Verifica URL y permisos.'}<br><small>El repositorio debe ser público para cargar desde raw.githubusercontent.com</small>`).show();
            $("#loading").fadeOut(300);
        }
    });
});
</script>
</body>
</html>
