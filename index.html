<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes de Armonización Legislativa</title>

<link rel="icon" href="favicon.png" type="image/png">

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 40px;
    background-color: #f4f6f8;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 { color: #2c3e50; }

#ultima-actualizacion {
    color: #7f8c8d;
    margin-bottom: 15px;
}

.stats {
    margin-bottom: 15px;
    font-weight: bold;
}

button {
    padding: 6px 10px;
    border-radius: 5px;
    border: none;
    background: #2980b9;
    color: white;
    cursor: pointer;
}

button:hover { background: #1f5f8a; }
</style>
</head>

<body>

<div class="container">

<h2>Pendientes de Armonización Legislativa</h2>
<div id="ultima-actualizacion"></div>
<div class="stats" id="stats"></div>

<button id="filtroVencidos">Solo vencidos</button>
<button id="limpiarFiltro">Mostrar todos</button>

<table id="tabla" class="display" style="width:100%">
<thead>
<tr>
<th>No</th>
<th>ORDENAMIENTO</th>
<th>MATERIA</th>
<th>PUBLICACIÓN</th>
<th>PLAZO</th>
<th>FECHA LÍMITE</th>
<th>VENCIMIENTO</th>
<th>HECHO</th>
<th>DECRETO</th>
<th>INICIATIVA</th>
</tr>
</thead>
</table>

</div>

<script>

function calcularVencimiento(fechaLimiteStr) {

    if (!fechaLimiteStr || fechaLimiteStr.toLowerCase().includes("pendiente")) {
        return "PENDIENTE";
    }

    const partes = fechaLimiteStr.split("/");
    if (partes.length !== 3) return "PENDIENTE";

    const fechaUTC = Date.UTC(partes[2], partes[1]-1, partes[0]);

    const hoy = new Date();
    const hoyUTC = Date.UTC(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());

    const diff = Math.round((fechaUTC - hoyUTC) / (1000 * 60 * 60 * 24));

    if (diff < 0) return "VENCIDO";
    if (diff === 0) return "VENCE HOY";
    return "FALTAN " + diff + " DÍAS";
}

let tabla;

$(document).ready(function() {

    $.ajax({
        url: "datos.csv?v=" + new Date().getTime(),
        dataType: "text",
        success: function(data, status, xhr) {

            const parsed = Papa.parse(data, {
                header: true,
                skipEmptyLines: true
            });

            const datos = parsed.data;

            // Fecha actualización
            const header = xhr.getResponseHeader("Last-Modified");
            if (header) {
                const fecha = new Date(header);
                $("#ultima-actualizacion").text(
                    "Última actualización: " + fecha.toLocaleDateString('es-MX')
                );
            }

            // Stats
            let vencidos = 0;
            datos.forEach(d => {
                if (calcularVencimiento(d["FECHA LÍMITE"]) === "VENCIDO") vencidos++;
            });

            $("#stats").html(`🔴 Vencidos: ${vencidos}`);

            tabla = $('#tabla').DataTable({
                data: datos,
                columns: [
                    { data: "No" },
                    { data: "ORDENAMIENTO" },
                    { data: "MATERIA REFORMA" },
                    { data: "PUBLICACIÓN DOF" },
                    { data: "PLAZO PARA ARMONIZAR" },
                    { data: "FECHA LÍMITE" },
                    {
                        data: "FECHA LÍMITE",
                        render: function(data) {
                            const v = calcularVencimiento(data);

                            if (v === "VENCIDO")
                                return `<span style="color:red;font-weight:bold;">${v}</span>`;

                            if (v === "VENCE HOY")
                                return `<span style="color:orange;font-weight:bold;">${v}</span>`;

                            if (v === "PENDIENTE")
                                return `<span style="color:gray;">${v}</span>`;

                            return v;
                        }
                    },
                    {
                        data: "HECHO",
                        render: function(data) {
                            if (data.toLowerCase().includes("iniciativa"))
                                return '<span style="color:green;">✔</span>';
                            return '<span style="color:#999;">✖</span>';
                        }
                    },
                    {
                        data: "ENLACE DECRETO",
                        render: function(data) {
                            return `<a href="${data}" target="_blank">Ver</a>`;
                        }
                    },
                    {
                        data: "INICIATIVA LOCAL",
                        render: function(data) {

                            if (!data || data.toLowerCase().includes("no hay")) {
                                return '<span style="color:#999;">No disponible</span>';
                            }

                            return `<a href="${data}" target="_blank">Ver iniciativa</a>`;
                        }
                    }
                ],
                language: {
                    url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
                }
            });

        }
    });

    $('#filtroVencidos').click(function() {
        $.fn.dataTable.ext.search.push(function(settings, data) {
            return data[6].includes("VENCIDO");
        });
        tabla.draw();
    });

    $('#limpiarFiltro').click(function() {
        $.fn.dataTable.ext.search.pop();
        tabla.draw();
    });

});

</script>

</body>
</html>
